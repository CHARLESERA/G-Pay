<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Pay Amount</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    text-align: center;
    background-color: #f9f9f9;
    color: #333;
  }
  img {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 20px;
  }
  h2 {
    margin-bottom: 15px;
    font-size: 2.5em;
    color: #222;
  }
  .amount-options {
    margin-bottom: 30px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
  }
  .amount-options label {
    margin: 10px 20px;
    font-size: 1.5em;
    cursor: pointer;
  }
  input[type="radio"] {
    transform: scale(1.8);
    margin-right: 12px;
    cursor: pointer;
  }
  h3 {
    margin-bottom: 20px;
    font-size: 2em;
    color: #444;
  }
  .buttons {
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 500px;
    margin: 0 auto;
  }
  .pay-option {
    display: flex;
    align-items: center;
    padding: 20px;
    border-radius: 12px;
    background-color: #007bff;
    cursor: pointer;
    transition: background-color 0.3s, transform 0.2s;
    font-size: 1.3em;
  }
  .pay-option:hover {
    background-color: #0056b3;
    transform: scale(1.02);
  }
  .pay-option img {
    height: 60px;
    width: auto;
    margin-right: 20px;
  }
  .pay-option span {
    color: white;
    font-weight: 600;
  }
  p {
    margin-top: 40px;
    font-size: 1.4em;
  }
  /* Make input labels more touch-friendly */
  @media(max-width: 600px){
    body {
      font-size: 1.2em;
    }
  }
</style>
</head>
<body>
    <img src="Pigeon.jpg" alt="Round Image" >

<h2>Pay Amount</h2>
<div class="amount-options">
  <label>
    <input type="radio" name="amount" value="10" checked> ₹10
  </label>
  <label>
    <input type="radio" name="amount" value="50"> ₹50
  </label>
  <label>
    <input type="radio" name="amount" value="100"> ₹100
  </label>
</div>

<h3>Click a Button to Pay</h3>
<div class="buttons">
  <div class="pay-option" onclick="payWithGPay()">
    <img src="gpay.jpg" alt="Google Pay Logo" />
    <span>Pay with Google Pay</span>
  </div>
  <div class="pay-option" onclick="payWithPhonePe()">
    <img src="phone.jpg" alt="PhonePe Logo" />
    <span>Pay with PhonePe</span>
  </div>
  <div class="pay-option" onclick="payWithPaytm()">
    <img src="paytm.jpg" alt="Paytm Logo" />
    <span>Pay with Paytm</span>
  </div>
</div>

<script>
  const upiID = "charlespro504-1@oksbi";

  function getAmount() {
    const selected = document.querySelector('input[name="amount"]:checked');
    return encodeURIComponent(selected.value);
  }

  function payWithGPay() {
    const amount = getAmount();
    const url = `upi://pay?pa=${upiID}&pn=Charles%20Pro&tn=Payment&am=${amount}&cu=INR`;
    window.location.href = url;
  }

  function payWithPhonePe() {
    const amount = getAmount();
    const url = `upi://pay?pa=${upiID}&pn=Charles%20Pro&tn=Payment&am=${amount}&cu=INR`;
    window.location.href = url;
  }

  function payWithPaytm() {
    const amount = getAmount();
    const url = `paytmmp://pay?pa=${upiID}&pn=Charles%20Pro&tn=Payment&am=${amount}&cu=INR`;
    window.location.href = url;
  }
</script>

<p style="margin-top:30px;">You can change the amount to pay before clicking the payment button.</p>

</body>
</html>
